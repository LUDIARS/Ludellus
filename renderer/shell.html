<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="light only" />
    <meta name="theme-color" content="#f7f1e8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self'; img-src 'self' data:; manifest-src 'self';" />
    <title>Ludellus</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="icons/uni-icon.svg" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" />
    <link rel="stylesheet" href="lib/theme.css" />
    <style>
      .shell-header {
        padding: 0.6rem 1rem;
        display: flex;
        align-items: center;
        gap: 1rem;
        background: rgba(255, 250, 241, 0.85);
        border-bottom: 1px solid var(--line);
      }
      .shell-title {
        font-weight: 900;
        font-size: 1.2rem;
        color: var(--uni-deep);
      }
      .shell-switcher {
        display: flex;
        gap: 0.4rem;
        flex-wrap: wrap;
      }
      .shell-chip {
        padding: 0.4rem 0.8rem;
        border-radius: 999px;
        background: var(--cream-soft);
        color: var(--ink);
        font-weight: 700;
        font-size: 0.9rem;
        cursor: pointer;
        border: 2px solid transparent;
        transition: border-color 120ms ease, background 120ms ease;
      }
      .shell-chip:hover { background: #e8ddc7; }
      .shell-chip.is-active {
        border-color: var(--uni-orange);
        background: #fff;
      }
      .shell-canvas-wrap {
        flex: 1;
        position: relative;
        margin: 0;
      }
      #game {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
      }
      .shell-footer {
        padding: 0.4rem 1rem 0.8rem;
        display: flex;
        gap: 0.6rem;
        justify-content: center;
        align-items: center;
        color: var(--ink-dim);
        font-size: 0.85rem;
      }
      .shell-fade {
        position: absolute;
        inset: 0;
        background: var(--cream);
        opacity: 0;
        pointer-events: none;
        transition: opacity 180ms ease;
        z-index: 30;
      }
      .shell-fade.is-fading { opacity: 1; }
    </style>
  </head>
  <body>
    <div id="stage" class="ludellus-stage">
      <header class="shell-header">
        <div class="shell-title">🌐 Ludellus</div>
        <div class="shell-switcher" id="switcher"></div>
        <div style="margin-left: auto;">
          <button class="ludellus-btn" id="btnStart">▶ はじめる</button>
        </div>
      </header>

      <main class="shell-canvas-wrap">
        <canvas id="game"></canvas>
        <div class="shell-fade" id="fade"></div>
      </main>

      <footer class="shell-footer">
        <span id="hint">ゲームを えらんで 「はじめる」 を おしてね</span>
      </footer>

      <div class="ludellus-toast" id="toast"></div>
    </div>

    <script type="module" src="shell.js"></script>
    <script>
      if ("serviceWorker" in navigator && (location.protocol === "http:" || location.protocol === "https:")) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("sw.js", { scope: "./" }).catch(() => {});
        });
      }
    </script>
  </body>
</html>
