<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="light only" />
    <meta name="theme-color" content="#f7f1e8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self'; img-src 'self' data:; manifest-src 'self';" />
    <title>Ludellus</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="icons/uni-icon.svg" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" />
    <link rel="stylesheet" href="lib/theme.css" />
    <style>
      .shell-header {
        padding: 0.6rem 1rem;
        display: flex;
        align-items: center;
        gap: 1rem;
        background: rgba(255, 250, 241, 0.85);
        border-bottom: 1px solid var(--line);
      }
      .shell-title {
        font-weight: 900;
        font-size: 1.2rem;
        color: var(--uni-deep);
      }
      .shell-switcher {
        display: flex;
        gap: 0.4rem;
        flex-wrap: wrap;
      }
      .shell-chip {
        padding: 0.4rem 0.8rem;
        border-radius: 999px;
        background: var(--cream-soft);
        color: var(--ink);
        font-weight: 700;
        font-size: 0.9rem;
        cursor: pointer;
        border: 2px solid transparent;
        transition: border-color 120ms ease, background 120ms ease;
      }
      .shell-chip:hover { background: #e8ddc7; }
      .shell-chip.is-active {
        border-color: var(--uni-orange);
        background: #fff;
      }
      .shell-canvas-wrap {
        flex: 1;
        position: relative;
        margin: 0;
      }
      #game {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
      }
      .shell-footer {
        padding: 0.4rem 1rem 0.8rem;
        display: flex;
        gap: 0.6rem;
        justify-content: center;
        align-items: center;
        color: var(--ink-dim);
        font-size: 0.85rem;
      }
      .shell-fade {
        position: absolute;
        inset: 0;
        background: var(--cream);
        opacity: 0;
        pointer-events: none;
        transition: opacity 180ms ease;
        z-index: 30;
      }
      .shell-fade.is-fading { opacity: 1; }

      /* AI 改修 modal */
      .ai-mod-modal {
        position: fixed; inset: 0;
        background: rgba(42, 33, 24, 0.55);
        display: flex; align-items: center; justify-content: center;
        z-index: 100;
      }
      .ai-mod-modal[hidden] { display: none; }
      .ai-mod-modal__inner {
        background: var(--cream);
        border-radius: var(--radius-lg);
        padding: 1.6rem 1.8rem;
        max-width: 480px;
        width: 92vw;
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.25);
        display: flex; flex-direction: column; gap: 1rem;
      }
      .ai-mod-modal__title {
        font-weight: 900;
        color: var(--uni-deep);
        font-size: 1.1rem;
      }
      .ai-mod-modal__rules {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.6rem;
      }
      .ai-mod-modal__rule {
        background: var(--panel, #fffaf1);
        background: linear-gradient(180deg, #fffaf1 0%, #f3e8d2 100%);
        border: 2px solid transparent;
        border-radius: var(--radius);
        padding: 0.8rem;
        cursor: pointer;
        text-align: left;
      }
      .ai-mod-modal__rule:hover { border-color: var(--uni-orange); }
      .ai-mod-modal__rule-label { font-weight: 800; color: var(--ink); }
      .ai-mod-modal__rule-desc { font-size: 0.78rem; color: var(--ink-dim); margin-top: 0.2rem; }
      .ai-mod-modal__branches-title {
        font-weight: 700;
        font-size: 0.85rem;
        color: var(--ink-dim);
        margin-bottom: 0.3rem;
      }
      .ai-mod-modal__branches-list {
        max-height: 160px; overflow-y: auto;
        display: flex; flex-direction: column; gap: 0.3rem;
      }
      .ai-mod-branch {
        padding: 0.4rem 0.6rem;
        background: var(--cream-soft);
        border-radius: 8px;
        font-size: 0.85rem;
        color: var(--ink);
      }
      .ai-mod-branch__path { color: var(--ink-dim); font-size: 0.75rem; }
    </style>
  </head>
  <body>
    <div id="stage" class="ludellus-stage">
      <header class="shell-header">
        <div class="shell-title">🌐 Ludellus</div>
        <div class="shell-switcher" id="switcher"></div>
        <div style="margin-left: auto; display: flex; gap: 0.5rem;">
          <button class="ludellus-btn ludellus-btn--ghost" id="btnAiMod" title="AI 改修">🤖 かいぞう</button>
          <button class="ludellus-btn" id="btnStart">▶ はじめる</button>
        </div>
      </header>

      <div class="ai-mod-modal" id="aiModModal" hidden>
        <div class="ai-mod-modal__inner">
          <div class="ai-mod-modal__title">🤖 この あそびを どう かいぞう する？</div>
          <div class="ai-mod-modal__rules" id="aiModRules"></div>
          <div class="ai-mod-modal__branches" id="aiModBranches">
            <div class="ai-mod-modal__branches-title">いままでの えだ</div>
            <div class="ai-mod-modal__branches-list" id="aiModBranchList"></div>
          </div>
          <button class="ludellus-btn ludellus-btn--ghost" id="btnAiModClose">うにに もどる</button>
        </div>
      </div>

      <main class="shell-canvas-wrap">
        <canvas id="game"></canvas>
        <div class="shell-fade" id="fade"></div>
      </main>

      <footer class="shell-footer">
        <span id="hint">ゲームを えらんで 「はじめる」 を おしてね</span>
      </footer>

      <div class="ludellus-toast" id="toast"></div>
    </div>

    <script type="module" src="shell.js"></script>
    <script>
      if ("serviceWorker" in navigator && (location.protocol === "http:" || location.protocol === "https:")) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("sw.js", { scope: "./" }).catch(() => {});
        });
      }
    </script>
  </body>
</html>
